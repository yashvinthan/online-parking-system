<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment - Online Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="index.html">Online Parking</a>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card p-4">
            <div class="row g-4">
              <div class="col-md-6">
                <h5 class="mb-3">Order Summary</h5>
                <ul class="list-group list-group-flush">
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Slot</span><strong>A1</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Date</span><strong>2025-10-12</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Time</span><strong>09:00 - 11:00</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Amount</span><strong>₹ 100.00</strong>
                  </li>
                </ul>
              </div>
              <div class="col-md-6">
                <h5 class="mb-3">Payment</h5>
                <div class="p-3 border rounded bg-light small">Demo placeholder for payment widget (Stripe/Razorpay)</div>
                <button class="btn btn-primary w-100 mt-3" onclick="location.href='confirmation.html'">Pay Now</button>
                <button class="btn btn-outline-secondary w-100 mt-2" onclick="location.href='booking.html'">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer py-4">
      <div class="container text-center text-muted small">© Online Parking System</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
  </html>
