<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmation - Online Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="index.html">Online Parking</a>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="text-center mb-4">
            <div class="text-success" style="font-size: 56px;">✓</div>
            <h3 class="mt-2">Booking Confirmed</h3>
            <p class="text-muted">Your payment was successful. Show this QR at the entry.</p>
          </div>
          <div class="card p-4">
            <div class="row g-4 align-items-center">
              <div class="col-md-5 text-center">
                <div class="qr-placeholder mx-auto"></div>
                <div class="small text-muted mt-2">QR Code Placeholder</div>
              </div>
              <div class="col-md-7">
                <h5 class="mb-3">Summary</h5>
                <ul class="list-group list-group-flush">
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Booking ID</span><strong>#1024</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Slot</span><strong>A1 (GF)</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Date</span><strong>2025-10-12</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Time</span><strong>09:00 - 11:00</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Amount</span><strong>₹ 100.00</strong>
                  </li>
                  <li class="list-group-item d-flex justify-content-between">
                    <span>Status</span><strong>Paid</strong>
                  </li>
                </ul>
                <div class="d-grid gap-2 mt-3">
                  <a class="btn btn-outline-primary" href="booking.html">Back to Dashboard</a>
                  <a class="btn btn-outline-secondary" href="#">Download Receipt</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer py-4">
      <div class="container text-center text-muted small">© Online Parking System</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
  </html>
