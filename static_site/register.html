<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - Online Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="index.html">Online Parking</a>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card p-4">
            <h4 class="mb-3">Create your account</h4>
            <form>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="reg_username">Username</label>
                  <input type="text" class="form-control" id="reg_username" placeholder="e.g. alex">
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="reg_email">Email</label>
                  <input type="email" class="form-control" id="reg_email" placeholder="you@example.com">
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="reg_phone">Phone</label>
                  <input type="text" class="form-control" id="reg_phone" placeholder="+91 98765 43210">
                </div>
                <div class="col-md-6"></div>
                <div class="col-md-6">
                  <label class="form-label" for="reg_password">Password</label>
                  <input type="password" class="form-control" id="reg_password" placeholder="Minimum 8 characters">
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="reg_confirm">Confirm Password</label>
                  <input type="password" class="form-control" id="reg_confirm" placeholder="Re-enter password">
                </div>
              </div>
              <button type="button" class="btn btn-primary w-100 mt-3">Create Account</button>
            </form>
            <div class="text-center mt-3 small">
              Already have an account? <a href="login.html">Login</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer py-4">
      <div class="container text-center text-muted small">© Online Parking System</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
  </html>
